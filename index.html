<!DOCTYPE html>
<html>
<head>
  <title>Shake Sensor Demo</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      transition: background 0.3s;
    }
    h1 {
      margin-top: 40vh;
    }
  </style>
</head>
<body>

<h1 id="status">Shake your phone!</h1>

<script>
let lastX = 0, lastY = 0, lastZ = 0;

window.addEventListener("devicemotion", function(event) {
  let acc = event.accelerationIncludingGravity;

  let diff = Math.abs(acc.x - lastX + acc.y - lastY + acc.z - lastZ);

  if (diff > 25) {
    triggerShake();
  }

  lastX = acc.x;
  lastY = acc.y;
  lastZ = acc.z;
});

function triggerShake() {
  const random = Math.random();

  if (random < 0.33) {
    document.body.style.background = "red";
    document.getElementById("status").innerText = "Too Dry 🌵";
  } else if (random < 0.66) {
    document.body.style.background = "green";
    document.getElementById("status").innerText = "Perfect 🌱";
  } else {
    document.body.style.background = "blue";
    document.getElementById("status").innerText = "Too Wet 💧";
  }
}
</script>

</body>
</html>
